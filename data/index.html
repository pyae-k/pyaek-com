    <!--
      Base-path detection (ported from pwa_duckdb/config.js). Runs as a classic
      script before the module so that the same build works at any deploy path,
      including GitHub Pages subpaths like /<repo>/. Sets window.__APP_BASE__ and
      injects a <base> tag so relative asset URLs resolve correctly. Skipped on
      file:// (Safari breaks relative scripts under <base> on file:).
    -->
    <script>
      (function () {
        try {
          var l = window.location;
          var override = window.__APP_BASE_OVERRIDE__;
          var base = override
            ? override
            : l.protocol === "file:"
            ? l.href.replace(/[^/]*$/, "")
            : l.pathname && l.pathname !== "/"
            ? l.pathname.replace(/[^/]*$/, "") || "/"
            : "/";
          if (!base.endsWith("/")) base += "/";
          window.__APP_BASE__ = base;
          if (l.protocol !== "file:") {
            var b = document.createElement("base");
            b.href = base;
            document.head.appendChild(b);
          }
        } catch (e) {
          window.__APP_BASE__ = "/";
        }
      })();
    </script>

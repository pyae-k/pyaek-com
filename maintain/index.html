    <style>
        * {

            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: "Inter", sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            line-height: 1.47059;
        }

        .container {
            text-align: center;
            max-width: 560px;
            animation: fadeIn 0.8s cubic-bezier(0.25, 0.1, 0.25, 1) both;
        }

        .icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 28px;
            color: #86868b;
        }

        .icon svg {
            width: 100%;
            height: 100%;
            animation: gentleSpin 8s linear infinite;
        }

        h1 {
            font-size: clamp(32px, 6vw, 48px);
            font-weight: 600;
            letter-spacing: -0.021em;
            line-height: 1.07;
            margin-bottom: 14px;
        }

        p {
            font-size: clamp(16px, 2.4vw, 20px);
            font-weight: 400;
            color: #86868b;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .signature {
            font-size: 14px;
            color: #86868b;
            margin-top: 32px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes gentleSpin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
